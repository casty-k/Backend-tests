name: Daily - Full L1 API Regression

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  daily-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SLACK_WEBHOOK_QA: ${{ secrets.SLACK_WEBHOOK_QA }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full Newman suite
        id: regression
        run: npm test
        env:
          API_BASE_URL: https://dev.user-mgmt.greenwheels.africa
          NODE_ENV: test

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-l1-api-regression
          path: results/
          if-no-files-found: ignore
          retention-days: 30

      - name: Slack daily summary
        if: always() && env.SLACK_WEBHOOK_QA != ''
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ env.SLACK_WEBHOOK_QA }}
          payload: |
            {
              "text": "Daily L1 API regression: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Daily L1 API regression*\n*Branch:* main\n*Environment:* dev.user-mgmt.greenwheels.africa\n*Status:* ${{ job.status }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Full report>"
                  }
                }
              ]
            }
