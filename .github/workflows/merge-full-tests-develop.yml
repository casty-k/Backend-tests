name: Main - Full L1 API Test Suite

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-test-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: happy
            script: test:happy
            artifact: l1-api-happy
          - name: errors
            script: test:errors
            artifact: l1-api-errors
          - name: idempotency
            script: test:idempotency
            artifact: l1-api-idempotency
    env:
      SLACK_WEBHOOK_QA: ${{ secrets.SLACK_WEBHOOK_QA }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Newman suite - ${{ matrix.suite.name }}
        run: npm run ${{ matrix.suite.script }}
        env:
          API_BASE_URL: https://dev.user-mgmt.greenwheels.africa
          NODE_ENV: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suite.artifact }}
          path: results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Slack notification on failure
        if: failure() && env.SLACK_WEBHOOK_QA != ''
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ env.SLACK_WEBHOOK_QA }}
          payload: |
            {
              "text": "main - L1 API suite failed: ${{ matrix.suite.name }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Main L1 API suite failed*\n*Suite:* ${{ matrix.suite.name }}\n*Commit:* ${{ github.sha }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View details>"
                  }
                }
              ]
            }
