name: PR - Collection Change Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'OS2-User-Mgmt-L1-API-Tests.postman_collection.json'
      - 'OS2_CommandGuards.postman_collection.json'
      - 'env.dev.json'
      - 'newman.config.json'
      - 'package.json'
      - 'package-lock.json'
      - 'run-tests.sh'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collection-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SLACK_WEBHOOK_QA: ${{ secrets.SLACK_WEBHOOK_QA }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate collection JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('OS2-User-Mgmt-L1-API-Tests.postman_collection.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('env.dev.json', 'utf8'))"

      - name: Run full collection tests
        run: npm test
        env:
          API_BASE_URL: https://dev.user-mgmt.greenwheels.africa
          NODE_ENV: test

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collection-change-results
          path: results/
          if-no-files-found: ignore
          retention-days: 5

      - name: Slack notification on failure
        if: failure() && env.SLACK_WEBHOOK_QA != ''
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ env.SLACK_WEBHOOK_QA }}
          payload: |
            {
              "text": "Collection change tests failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Collection change tests failed*\n*Author:* @${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View details>"
                  }
                }
              ]
            }
